name: FreshMart CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — PHP Syntax Lint
  # ─────────────────────────────────────────────
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Syntax check all PHP files
        run: |
          find . -name "*.php" ! -path "./vendor/*" -print0 \
            | xargs -0 -I{} php -l {}
          echo "✅ All PHP files passed syntax check"

  # ─────────────────────────────────────────────
  # JOB 2 — Docker Build
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t freshmart:${{ github.sha }} .
          echo "✅ Docker image built successfully"

  # ─────────────────────────────────────────────
  # JOB 3 — Deploy to InfinityFree via FTP
  # Runs on every push to main/master
  # ─────────────────────────────────────────────
  deploy-ftp:
    name: Deploy to InfinityFree
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ftpupload.net
          username: if0_42195969
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /htdocs/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            docker/**
            Dockerfile
            docker-compose.yml
            .dockerignore
            config.php
            README.md
