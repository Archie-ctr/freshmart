name: FreshMart CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Lint & syntax-check all PHP files
  # ─────────────────────────────────────────────
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: php-cs-fixer

      - name: Check PHP syntax (all .php files)
        run: |
          find . -name "*.php" \
            ! -path "./vendor/*" \
            -print0 | xargs -0 -I{} php -l {}
          echo "✅ All PHP files passed syntax check"

  # ─────────────────────────────────────────────
  # JOB 2 — Build & test Docker image
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t freshmart:${{ github.sha }} .
          echo "✅ Docker image built successfully"

      - name: Start services with docker-compose
        run: |
          docker compose up -d
          echo "⏳ Waiting for services to be ready..."
          sleep 20

      - name: Smoke test — HTTP health check
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:8080/)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -ne 200 ] && [ "$STATUS" -ne 302 ]; then
            echo "❌ Health check failed with status $STATUS"
            docker compose logs app
            exit 1
          fi
          echo "✅ Application is responding (HTTP $STATUS)"

      - name: Check key pages respond
        run: |
          for PAGE in "/" "/shop.php" "/login.php" "/register.php" "/cart.php"; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:8080$PAGE)
            echo "  $PAGE → HTTP $STATUS"
            if [ "$STATUS" -ne 200 ] && [ "$STATUS" -ne 302 ]; then
              echo "❌ Page $PAGE returned unexpected status $STATUS"
              exit 1
            fi
          done
          echo "✅ All key pages are accessible"

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ─────────────────────────────────────────────
  # JOB 3 — Push image to Docker Hub & deploy
  #         (only on push to main/master)
  # ─────────────────────────────────────────────
  deploy:
    name: Push & Deploy
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/freshmart:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/freshmart:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/Archie-ctr/freshmart
            org.opencontainers.image.url=https://freshmartstore.gt.tc/
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server via SSH
        if: ${{ secrets.DEPLOY_HOST != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/freshmart
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "✅ Deployed freshmart:${{ github.sha }}"
