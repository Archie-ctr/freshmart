name: FreshMart CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — PHP Syntax Lint
  # ─────────────────────────────────────────────
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Syntax check all PHP files
        run: |
          find . -name "*.php" ! -path "./vendor/*" -print0 \
            | xargs -0 -I{} php -l {}
          echo "✅ All PHP files passed syntax check"

  # ─────────────────────────────────────────────
  # JOB 2 — Docker Build & Smoke Test
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t freshmart:ci .

      - name: Start services
        run: docker compose up -d

      - name: Wait for MySQL (up to 90s)
        run: |
          echo "Waiting for MySQL..."
          for i in $(seq 1 18); do
            if docker exec freshmart_db mysqladmin ping -u freshmart -pfreshmart_pass --silent 2>/dev/null; then
              echo "✅ MySQL ready after ~$((i*5))s"
              break
            fi
            echo "  [$i/18] not ready, waiting 5s..."
            sleep 5
          done

      - name: Wait for app (up to 60s)
        run: |
          echo "Waiting for app..."
          for i in $(seq 1 12); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ || echo "000")
            if [ "$CODE" = "200" ] || [ "$CODE" = "302" ]; then
              echo "✅ App ready (HTTP $CODE)"
              break
            fi
            echo "  [$i/12] HTTP $CODE — retrying in 5s"
            sleep 5
          done

      - name: Smoke test key pages
        run: |
          FAILED=0
          for PAGE in "/" "/shop.php" "/login.php" "/register.php" "/cart.php"; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080${PAGE} || echo "000")
            echo "  ${PAGE} → ${CODE}"
            if [ "$CODE" != "200" ] && [ "$CODE" != "302" ]; then
              FAILED=1
            fi
          done
          if [ "$FAILED" = "1" ]; then
            echo "--- App logs ---"
            docker compose logs app --tail=80
            exit 1
          fi
          echo "✅ All pages OK"

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ─────────────────────────────────────────────
  # JOB 3 — Push to Docker Hub & Deploy
  # Skipped unless DOCKERHUB_USERNAME secret set
  # ─────────────────────────────────────────────
  deploy:
    name: Push & Deploy
    runs-on: ubuntu-latest
    needs: docker-build
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/freshmart:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/freshmart:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: SSH Deploy
        if: ${{ secrets.DEPLOY_HOST != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/freshmart
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "✅ Deployed ${{ github.sha }}"

      - name: Deploy skipped notice
        if: ${{ secrets.DOCKERHUB_USERNAME == '' }}
        run: echo "⚠️ Deploy skipped — add DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets to enable."
