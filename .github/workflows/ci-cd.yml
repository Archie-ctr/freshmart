name: FreshMart CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Lint & syntax-check all PHP files
  # ─────────────────────────────────────────────
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Check PHP syntax (all .php files)
        run: |
          find . -name "*.php" \
            ! -path "./vendor/*" \
            -print0 | xargs -0 -I{} php -l {}
          echo "✅ All PHP files passed syntax check"

  # ─────────────────────────────────────────────
  # JOB 2 — Build & smoke-test Docker image
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t freshmart:${{ github.sha }} .
          echo "✅ Docker image built successfully"

      - name: Start services with docker compose
        run: |
          docker compose up -d
          echo "⏳ Waiting for MySQL and app to be ready..."

      - name: Wait for MySQL to be healthy
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T db mysqladmin ping -h localhost -u freshmart -pfreshmart_pass --silent 2>/dev/null; then
              echo "✅ MySQL is ready (attempt $i)"
              break
            fi
            echo "  attempt $i/30 — waiting 5s..."
            sleep 5
          done

      - name: Wait for app to respond
        run: |
          for i in $(seq 1 20); do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:8080/ || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
              echo "✅ App is responding (HTTP $STATUS)"
              break
            fi
            echo "  attempt $i/20 — HTTP $STATUS, waiting 5s..."
            sleep 5
          done

      - name: Smoke test — check key pages
        run: |
          PASS=true
          for PAGE in "/" "/shop.php" "/login.php" "/register.php" "/cart.php"; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:8080$PAGE || echo "000")
            echo "  $PAGE → HTTP $STATUS"
            if [ "$STATUS" != "200" ] && [ "$STATUS" != "302" ]; then
              echo "❌ $PAGE returned $STATUS"
              PASS=false
            fi
          done
          if [ "$PASS" = "false" ]; then
            docker compose logs app
            exit 1
          fi
          echo "✅ All key pages are accessible"

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ─────────────────────────────────────────────
  # JOB 3 — Push to Docker Hub & deploy
  #         Skipped gracefully if secrets not set
  # ─────────────────────────────────────────────
  deploy:
    name: Push & Deploy
    runs-on: ubuntu-latest
    needs: docker-build
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ DOCKERHUB_USERNAME or DOCKERHUB_TOKEN not set — skipping push & deploy"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.check_secrets.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.check_secrets.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image to Docker Hub
        if: steps.check_secrets.outputs.skip == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/freshmart:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/freshmart:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/Archie-ctr/freshmart
            org.opencontainers.image.url=https://freshmartstore.gt.tc/
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server via SSH
        if: steps.check_secrets.outputs.skip == 'false' && secrets.DEPLOY_HOST != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/freshmart
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "✅ Deployed freshmart:${{ github.sha }}"

      - name: Summary
        if: steps.check_secrets.outputs.skip == 'true'
        run: |
          echo "## ⚠️ Deploy skipped" >> $GITHUB_STEP_SUMMARY
          echo "Docker Hub secrets not configured. Jobs 1 (lint) and 2 (build+test) passed." >> $GITHUB_STEP_SUMMARY
          echo "To enable deploy, add DOCKERHUB_USERNAME and DOCKERHUB_TOKEN in repo Settings → Secrets." >> $GITHUB_STEP_SUMMARY
