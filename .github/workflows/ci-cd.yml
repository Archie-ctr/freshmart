name: FreshMart CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — PHP Syntax Lint
  # ─────────────────────────────────────────────
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Syntax check all PHP files
        run: |
          find . -name "*.php" ! -path "./vendor/*" -print0 \
            | xargs -0 -I{} php -l {}
          echo "✅ All PHP files passed syntax check"

  # ─────────────────────────────────────────────
  # JOB 2 — Docker Build
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t freshmart:${{ github.sha }} .
          echo "✅ Docker image built successfully"

  # ─────────────────────────────────────────────
  # JOB 3 — Push to Docker Hub & Deploy
  # Only runs if DOCKERHUB_USERNAME secret is set
  # ─────────────────────────────────────────────
  deploy:
    name: Push & Deploy
    runs-on: ubuntu-latest
    needs: docker-build
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/freshmart:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/freshmart:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: No secrets configured
        if: ${{ secrets.DOCKERHUB_USERNAME == '' }}
        run: echo "⚠️ Skipping push — DOCKERHUB_USERNAME secret not set."
